front:
  text: 丹陽真人語録畢二
  hash: sha256:a95a5933a28e236f7024ae8ab199c0852622e571096d6388993457f01330292d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0080_HFL_000-001a, image: hfl/0728/0728-032.png}
body:
  text: 靈隱子王頥中集大定癸卯三月間始拜師於牟平范明叔庵之南師曰汝從何而來僕對曰來自東武仰師之德不以貨財為富恬然自得坐進斯道乃聞其風而悅之願侍巾屨伏聽一言師乃欣然曰㑗年少有學道之心不可得也良久曰飢則喫飯去飯罷則打睡去一日師見僕拱手而立方呵曰道人只要豁暢不可存體靣庵不是廨宇你又不是官長若却講俗禮則交接去處古人云三山有侣人情淡四海無家道義深不徒設也師每垂語曰學道者必在自悟不悟者昏蒙所致故也欲發昏蒙先滌其心在乎澄湛明了而巳功到而成不必叩請於他人是工拙坦然明白矣師在東牟道上行僧道往來者識與不識必先致拜從者疑而問之曰彼此俱昧平生何用拜之師曰道以柔弱謙下為本況三教同門異户耳孔子言雖執鞭之士吾亦為之未聞一拜之為一過師言祖師素攻文章了道之後尤為敏給至於藏頭拆字隱語聯珠略不搆思常和人詩有押節字者衆皆和畢唯祖師最後和云三百六十金骨節衆皆歎服以為神仙語如今誰能繼得除是磻溪公頗似步驟師言祖師嘗到登州時頂笠懸鶉執一笻携一鐵𤮴狀貌奇古乞於市肆登州人皆不識夜歸觀書一絶於壁一别終南水竹村家無兒女亦無孫數千里外尋知友引入長生不死門明旦拂衣東邁後數日郡守紇石烈邈詣觀觀其題詩欽歎不已乃依韻和曰回首三年别故村都忘庭竹長兒孫他時拂袖尋君去應許安間一叩門師言薄滋味所以養氣去嗔怒所以養性處污辱低下所以養德守一清淨恬憺所以養道名不著於薄籍心不繫於勢利此所以脫人之殼與天為徒也師曰酒為亂性之漿肉是斷命之物直須不喫為上酒肉犯之猶可恕若犯於色則罪不容於誅矣何故蓋色者甚於狼虎敗人美行損人善事亡精滅神至於殞軀故為道人之大孽也師曰升平快活莫過於間道人若住庵稍倦結一兩人作伴挂搭腋袋拖條拄杖且歌且遊撞著好山好水且為盤桓不可貪程途師謂僕曰學道人要有終始不可半道而廢與他人作笑端況㑗是讀書兒豈不知凡人立身須著一般事業況為道者正是男子立身大事師常書大字一聯與道友曰速把人我山放倒急將龍虎穴衝開僕因問曰人我山始知龍虎穴敢問其方師笑曰天機未敢輕分付細細看賢悟不悟師一日呼僕良久而赴問那裏去來僕對曰午窗睡方足神情湛然床頭有莊子書一册因拈而讀之所以不在此也師曰夫道要心契若復以文字繫縛何日是了期所以道悟徹南華迷更迷師在華亭曰道者何物也祖氣便是根源豈不知鼻中出者也豈不廣成子曰丹竈河車休矻矻鶴胎龜息自綿綿師語衆曰學道專一則人人可以為仙不同世俗之進取有黜落也儒則博而寡要道則簡而易行但清淨無為最上乘法也師居環堵中但設几榻筆硯羊皮而巳曠然無餘物早晨則一碗粥午間一鉢麵過此巳往衆茹不經口一日召僕入命坐良久僕問曰吾師之道有作為否師曰無也雖歌詞中每詠龍虎嬰姹皆寄言爾是以要道之妙不過養氣人但汨沒利名往往消耗其氣學道者無他務在養氣而巳夫心液下降腎氣上升至于脾元氣氤氲不散則丹聚矣若肝與肺往來之路也習靜至久當自知之苟不養氣雖挾泰山超北海非道也此言未化前十日所説也僕與曹劉二三伴在環堵外立忽出曰夫道但清淨無為逍遙自在不染不著此十二字若能咬嚼得破便做箇徹底道人但信老人言行之自當有益必不悮你諸年少師在黃縣西郊馬從仁庵內唱曰縱日消萬兩黃金正好粗衣淡飯言去歲過外關聞人誦此語喜其有理故記之不知何人作有馬元之曰此語是順長老葦江集中語也師言奇哉是言也師言家風誰是祖鍾吕自親傳頌曰一點靈光晃太虛丹青妙手莫能模休將明月間相比有闕因緣怎類吾此語稍露鋒芒矣師曰氣之難御迅若奔馬唯靜者為易必去其外慕雖覩紛華之在眼前正如深山窮谷中方是道人心腸儻不到無心地面莫能制御是知道者貴於無心也師又云心定則清忘體虛則氣運心死則神活陽盛則陰消自然之理昧者不知但以為子孫計返以學道者為無益何不思之甚也師曰豫年四十餘方遇師入道所以鬢皤然腹中别有一紺髮者何由致之向往關中十餘年所養神氣耳譬如空谷中有呼之者隨呼而應之豈别物哉但其中沖虛故也吾友不信誠靜處養之當自知之師言海蟾公本燕國相一旦悟道乃絶家纍其詩有拋離火宅三千口屏棄門兵百萬家之語後但乞食自資逢場作戲至與娼妓家擔酒携榼不以為恥後來一等學道者言我從富貴中來你比他海蟾公不著師曰清靜之道人能辨之則盡善盡美矣故經云人能常清淨天地悉皆歸言天地者非外指覆載之天地也蓋指身中之天地也人之膈巳上為天膈巳下為地若天氣降地脈通上下沖和精氣自固矣此小任仙所説也師曰守氣妙在乎全精尤當防於睡眠方欲寢時令正念現前萬慮悉泯斂身側卧鼻息綿綿魂不內蕩神不外遊如是則氣精自定矣師曰儒家云以德報德以直報怨昔真人云以信結友以恩復讎可謂至矣師在萊州時有薑禧者携吕公傳呈師師讀到世人惟務名之與利不知身之有神逐物不返喪盡天真其誰咎矣師乃掩卷謂禧曰此語實中理矣然世無悟者何道之難行也有韓淘字清甫慕陶淵明邵堯夫為人號安樂園公師自關右還東牟道過濟南邀師到園中供以素飯既畢淘叩首於師曰淘自幼歲慕道今巳垂白幸遇我師願垂一語以燭愚蒙師答曰夫道以無心為體忘言為用以柔弱為本以清淨為基若施於人必節飲食絶思慮靜坐以調息安寢以養氣心不馳則性定形不勞則精全神不擾則丹結然後滅情於虛寧神於極可謂不出户庭而妙道得矣韓謝曰大道鴻濛無所扣詰今聞妙論得其門而入矣曹萊二公本儒生也隳儒學道多年莫逆常從容而問曰師在關右時如何辦道曹萊答曰師父冬夏披一布懶衣食粗取足隆冬雪寒庵中無火兼時用冷水其神氣和暢殊無寒意如此十年非腹中有道氣則不能枝捂矣師曰凡事必當有備則無患故為道者於少壯之時防其情欲早為之備則神仙可冀若素髮垂領志氣衰憊始欲學道譬若大寒而後索衣裘不亦晚乎師曰三十六道引二十四還丹此乃入道之漸門不可便為大道若窮於爐竈取象於龜蛇乃無事生事於性上添偽也此皆悮人之甚矣故道家留丹經子書千經萬論可一言以蔽之曰清淨師曰清淨者清為清其心源淨為淨其氣海心源清則外物不能撓故情定而神明生焉氣海淨則邪欲不能干故精全而腹實矣是以澄心如澄水養氣如養兒氣秀則神靈神靈則氣變乃清淨所致也若行有心有為之功則有盡之術法也若行無心無為之理乃無盡之清虛也師曰無為者不思不慮也愛欲嗔怒積畜利害其間雖有為而常無為雖涉事而常無事何況專一清心淨意養氣全神飄遊於逍遙之地入於無何有之鄉師曰劉高尚居環堵四十年别無他事但虛其心實其腹去其華忘其名棄其利清其神全其氣丹自結仙自成乃有讚之曰塞其兊閉其門昔誦此語今見斯人可謂簡且當矣師曰無心者非同貓狗蠢然無心也務存心於清淨之域而無邪心也故俗人無清淨之心道人無塵垢之心非所謂俱無心而與木石貓狗一般也師曰不生滅見如來悟了之時免却再投胎丘君曰此乃出陰神若到天庭忽有雙華飛方出陽神此乃初地也師曰大道人情逺無為妙本基世間無愛物煩惱不相隨師曰修行人功行未滿大限到來聖賢不教死若不做修行人大限到來免他不得師曰一念勿絶一世休龔道升問曰湛然常寂時如何師答曰將來和湛然都不用于清風問曰修行數年道眼不明心地不靈何也師曰别無他事行道不精爾師曰一切男女從無始巳來為有種種恩愛貪欲不出輪回世界一切胎卵濕化種種性相皆因愛欲而生性命性因愛而生命因欲而有皆因愛欲而起逆順生嫉妬從此輪回綿綿不斷法言欲淨其土當淨其心若心清淨輪回自息師性嗜撥粥午間則啖一鉢畢與人談道訓誘後進不倦師蓋性慈善君子也在萊陽時作長短句有一餐鉢粥罷須辦十分功之句學者省此徒飲食端坐不以道為事者其譴纍故可知也師言學道者不須廣看經書亂人心思妨人道業若河上公注道德經金陵子注陰符經二者時看亦不妨亦不如一切不讀觜盧都地養氣最為上策師言學道人行住坐卧不得少頃心不在道行則措足於坦途住則凝情於太虛坐則勻鼻端之息睡則抱臍下之珠久而調息無有間斷而終日如愚方是端的功夫非干造作行持也師曰凡初學道截自今日已往俗事不得挂心若有織毫未除則道不固既往事不思未來事不念且據目前為見在便是無事人師又言道人不厭貧貧乃養生之本飢則餐一鉢粥睡來鋪一束草繿繿縷縷以度朝夕正是道人活計故知清淨一事豪貴人不能得師過青社有邀師齋者在坐有衲僧數人其中有一僧騁其博辨以言詰難紛紜不止師徐言答曰倘除一身外餘事皆不知其僧赧然失色不能措辭師曰凡作道人須是剛腸男子切莫狐疑不決但念性命事大力行不退期於必成若兒女情多煙霞志少非所謂學道者也師曰身中之氣不可散心中之神不可昧或問曰何由得氣不散師曰身無為又曰何由得神不昧師曰心無事又曰身心如是可住庵否師曰既處置得下便好休歇去師曰道人心性塵俗之事切莫隨逐若拖條藜杖嘲風詠月陶冶情性有何不可至於巡門求乞推來搶去恰是道人日用家風也師言你每初入關時乞得一頓飯便喫一頓今則你每功行少也揀好處住揀好食喫將來成道則休不了却索還債去師曰我初到關中乞化到一酒肆有一醉者毁罵之間後被他贈一拳便走拽住又打一拳只得忍受汝曹曾遭此魔障否弟子答曰無師父云好好遇著勿諍師言祖師道不得著好衣不得喫好飯唱歌打令只要心頭物物不著師言我嘗在俗中時稱肉斗酒今巳戒之十數年矣若食酒肉亦做神仙只是較遲了些若心不懷道又嗜酒貪羶徒羡口腹罪報難逃終為下鬼之類也師言祖師引四人謂丘劉談馬也看任風子於好德祖師云倘聞之塞破耳及乎見了尚握著珍寶不敢放動劉師叔亦嘗言之師言嘗在環裏思間話論及新瓜道衆聞之明日造瓜包子入環食了三枚罰了三日不得喫飯師言祖師嘗使弟子去寧海乞化些小錢米我要使用弟子道教别箇弟兄去後如何弟子有願不還鄉里祖師怒打到平旦而止打之無數吾有退心謝他丘師兄勸住逮今不敢相忘師言在鄉時祖師令弟子入萊州乞化到數日意猶遲疑夜夢師曰來日長伸著手做條好漢上街展手初妄心障退故師發此言也師曰回鄉中初上街祖師合總一頭小角兒面上以胭粉搽之𥝠心云不怕撞著兒女相識只怕撞著親家每思到范明叔宅欲少歇見太親先在宅中自云這回休羞麼弟子問許真君上升傳云後一千二百四十年間當有八百人登仙如何師曰祖師曾言教萬人俚王子仙又説來師曰張閻子有一句甚好每道話往來但要照顧潤身之寶師自笑曰他開鋪席説話却是勸别人師曰百不歌十勸非倘自出意亦是祖師曾説過之話因而成之也師言大抵人多是自誇俱能巳勝往往不肯恭順於人師言路上拾得驢契祖師直打到曉頭靣上拳打有甚數目也師言人尚不信倘于清風曰是他有信者師微哂之綦大成云師父如此行止尚人信清風曰一箇信者一仙人緣此不信師曰深藏白雪非為恪廣積黃芽不屬貪言畢笑曰如何好麼又曰夢裏鑄成無影劔法中去了有情心又曰瑶池殿下青鸞舞閬苑宫中白鶴飛師還海上人家皆嚴持齋戒投依五會乃祖師所立師童聞馬師在登郡時會衆百餘人白師曰弟子等各各沐浴靜居及戒斷葷酒已七日矣願隨清會祈福以消來業師曰善公等清淨七日尚言有福馬風門人箇箇終身清淨絶嗜欲斷葷酒福且多矣會衆皆禮拜嘆曰清淨之教實不可思議自是三州之人比屋受教漸及十方聞風信嚮大教重興自師而始師問衆門人曰一日幾箇時辰門人對曰一日六箇時辰師曰晝夜總幾箇時辰門人曰晝夜總十二箇時辰師曰晝夜十二箇時中天道運行斡旋造化還有頃刻停息否門人對曰無停息師曰凡學道之人切須法天之道斡旋巳身中造化十二時中常清常淨不起織毫塵念則方是修行日就月將無有間斷決做神仙苟或虧功失行怎得了達我觀汝輩十二時中不曾有一箇時辰專心在道受了十方施主供養如何還得一朝合眼復入輪回何時出期我今叮嚀説與汝等但自澄心遣欲萬緣不染神氣沖和便是道也依此修行不得到錯了若因循怠墮行持不到非吾罪也豈不念汝等七祖生前造諸惡業冥中受諸罪苦望子孫成道救拔得生天各冝以此為念發堅固心抱道而死此吾所願也𤥂重門人聞是慈音皆歡然自得競加勉勵焉師謂衆曰道無形名是神氣之祖也元氣降化神明自生鍊神合道乃是修真其餘名相紛紜難為憑準我念為汝舉其大綱夫修此之要不離神氣神氣是性命性命是龍虎龍虎是鉛汞鉛汞是水火水火是嬰姹嬰姹是真陰真陽真陰真陽即是神氣種種名相皆不可著止是神氣二字而巳欲要養氣全神須當屏盡萬緣表裏清淨久久精專神凝氣沖三年不漏下丹結六年不漏中丹結九年不漏上丹結是名三丹圓備九轉功成骨髓凝化血脈成真內完外溢光影徹明寂然不動應感無窮千變萬化坐在立亡三萬六千神靈踴躍遊行天下三界司迎八難之中千凶萬毒莫能消亡至於大劫變化洪災四衝神滿太虛亦無所礙故天有時而崩地有時而陷山有時而摧海有時而竭凡有相者終劫於壞惟學道者到神與道合處則永劫無壞兼功及九祖升上清矣丹陽真人語録
